name: Madhubani Three-Tier CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:
  # ==========================================================
  # 1. FRONTEND VALIDATION
  # ==========================================================
  frontend-ci:
    name: Frontend chal raha hai
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Verify frontend files
        run: |
          # Stop if any required frontend file does not exist.
          test -f frontend/index.html
          test -f frontend/style.css
          test -f frontend/app.js
          test -f frontend/nginx.conf
          test -f frontend/Dockerfile

      - name: Check frontend JavaScript syntax
        run: node --check frontend/app.js


  # ==========================================================
  # 2. BACKEND VALIDATION
  # ==========================================================
  backend-ci:
    name: Backend chal raha hai
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

          # Cache npm packages to reduce future pipeline time.
          cache: npm

          # package-lock.json is inside the backend folder.
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Check backend JavaScript syntax
        run: node --check server.js


  # ==========================================================
  # 3. SONARQUBE ANALYSIS
  # ==========================================================
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest

    # SonarQube runs only when both validation jobs succeed.
    needs:
      - frontend-ci
      - backend-ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # SonarQube requires complete Git history for
          # accurate branch and blame information.
          fetch-depth: 0

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Check SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}


  # ==========================================================
  # 4. DOCKER BUILD, TRIVY SCAN AND PUSH
  # ==========================================================
  docker-build-scan-and-push:
    name: Build, Scan and Push Docker Images
    runs-on: ubuntu-latest

    # Run only after SonarQube succeeds.
    needs: sonarqube

    # Do not log in to Docker Hub or push images during
    # pull-request validation.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # ------------------------------------------------------
      # 1. DOWNLOAD REPOSITORY
      # ------------------------------------------------------
      - name: Checkout source code
        uses: actions/checkout@v4


      # ------------------------------------------------------
      # 2. SET UP DOCKER BUILDX
      # ------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      # ------------------------------------------------------
      # 3. LOGIN TO DOCKER HUB
      # ------------------------------------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      # ------------------------------------------------------
      # 4. BUILD FRONTEND IMAGE LOCALLY
      # ------------------------------------------------------
      - name: Build frontend image locally
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile

          # Do not push before Trivy scanning.
          push: false

          # Load the image into the GitHub runner's
          # local Docker image store.
          load: true

          # Both tags refer to the same frontend image.
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/madhubani-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/madhubani-frontend:latest

          # Reuse Docker layers from previous pipeline runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max


      # ------------------------------------------------------
      # 5. BUILD BACKEND IMAGE LOCALLY
      # ------------------------------------------------------
      - name: Build backend image locally
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile

          # Do not push before security scanning.
          push: false

          # Make the image available to Trivy.
          load: true

          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/madhubani-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/madhubani-backend:latest

          cache-from: type=gha
          cache-to: type=gha,mode=max


      # ------------------------------------------------------
      # 6. VERIFY LOCALLY BUILT IMAGES
      # ------------------------------------------------------
      - name: Verify locally built images
        shell: bash
        run: |
          # Stop immediately when any command fails.
          set -e

          echo "========================================"
          echo "Docker images available on the runner"
          echo "========================================"

          docker image ls

          echo ""
          echo "Checking frontend image..."

          docker image inspect \
            "${{ secrets.DOCKERHUB_USERNAME }}/madhubani-frontend:${{ github.sha }}" \
            > /dev/null

          echo "Frontend image found successfully."

          echo ""
          echo "Checking backend image..."

          docker image inspect \
            "${{ secrets.DOCKERHUB_USERNAME }}/madhubani-backend:${{ github.sha }}" \
            > /dev/null

          echo "Backend image found successfully."


      # ------------------------------------------------------
      # 7. TRIVY FRONTEND IMAGE SCAN
      # ------------------------------------------------------
      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          # Scan the exact image generated from this commit.
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/madhubani-frontend:${{ github.sha }}

          # Run only vulnerability scanning.
          scanners: vuln

          # Scan Linux packages and application libraries.
          vuln-type: os,library

          # Display only serious vulnerabilities.
          severity: HIGH,CRITICAL

          # Do not include vulnerabilities for which
          # no official fix is currently available.
          ignore-unfixed: true

          # Print a readable report in workflow logs.
          format: table

          # Learning mode:
          # show vulnerabilities but continue the pipeline.
          exit-code: "0"


      # ------------------------------------------------------
      # 8. TRIVY BACKEND IMAGE SCAN
      # ------------------------------------------------------
      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/madhubani-backend:${{ github.sha }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"


      # ------------------------------------------------------
      # 9. PUSH FRONTEND IMAGE
      # ------------------------------------------------------
      - name: Push frontend image to Docker Hub
        shell: bash
        run: |
          # Stop if either Docker push command fails.
          set -e

          echo "Pushing commit-specific frontend image..."

          docker push \
            "${{ secrets.DOCKERHUB_USERNAME }}/madhubani-frontend:${{ github.sha }}"

          echo "Pushing latest frontend image..."

          docker push \
            "${{ secrets.DOCKERHUB_USERNAME }}/madhubani-frontend:latest"


      # ------------------------------------------------------
      # 10. PUSH BACKEND IMAGE
      # ------------------------------------------------------
      - name: Push backend image to Docker Hub
        shell: bash
        run: |
          set -e

          echo "Pushing commit-specific backend image..."

          docker push \
            "${{ secrets.DOCKERHUB_USERNAME }}/madhubani-backend:${{ github.sha }}"

          echo "Pushing latest backend image..."

          docker push \
            "${{ secrets.DOCKERHUB_USERNAME }}/madhubani-backend:latest"


      # ------------------------------------------------------
      # 11. PIPELINE SUMMARY
      # ------------------------------------------------------
      - name: Print Docker pipeline summary
        shell: bash
        run: |
          echo "========================================"
          echo "Docker pipeline completed successfully"
          echo "========================================"

          echo "Frontend image:"
          echo "${{ secrets.DOCKERHUB_USERNAME }}/madhubani-frontend:${{ github.sha }}"

          echo ""
          echo "Backend image:"
          echo "${{ secrets.DOCKERHUB_USERNAME }}/madhubani-backend:${{ github.sha }}"

          echo ""
          echo "Trivy security gate: Learning mode"
          echo "Trivy exit code: 0"



































