        # 1. Build frontend locally
      - name: Build frontend image locally
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/madhubani-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/madhubani-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Build backend locally
      - name: Build backend image locally
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/madhubani-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/madhubani-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 3. Confirm that Docker can see both images
      - name: Verify locally built images
        run: |
          docker image ls

          docker image inspect \
            "${{ secrets.DOCKERHUB_USERNAME }}/madhubani-frontend:${{ github.sha }}"

          docker image inspect \
            "${{ secrets.DOCKERHUB_USERNAME }}/madhubani-backend:${{ github.sha }}"

      # 4. Install Trivy
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy

          trivy --version

      # 5. Scan frontend without blocking the pipeline
      - name: Scan frontend Docker image
        run: |
          trivy image \
            --exit-code 0 \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --format table \
            "${{ secrets.DOCKERHUB_USERNAME }}/madhubani-frontend:${{ github.sha }}"

      # 6. Scan backend without blocking the pipeline
      - name: Scan backend Docker image
        run: |
          trivy image \
            --exit-code 0 \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --format table \
            "${{ secrets.DOCKERHUB_USERNAME }}/madhubani-backend:${{ github.sha }}"

      # 7. Push only after both scans execute successfully
      - name: Push frontend images
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/madhubani-frontend:${{ github.sha }}"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/madhubani-frontend:latest"

      - name: Push backend images
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/madhubani-backend:${{ github.sha }}"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/madhubani-backend:latest"





































