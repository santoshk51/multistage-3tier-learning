name: Madhubani Three-Tier CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  frontend-ci:
    name: Frontend chal raha hai
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Verify frontend files
        run: |
          test -f frontend/index.html
          test -f frontend/style.css
          test -f frontend/app.js
          test -f frontend/nginx.conf
          test -f frontend/Dockerfile

      - name: Check frontend JavaScript syntax
        run: node --check frontend/app.js

  backend-ci:
    name: Backend chal raha hai
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Check backend JavaScript syntax
        run: node --check server.js
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs:
      - frontend-ci
      - backend-ci
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:   # Downloads your frontend, backend, and configuration files
          fetch-depth: 0

      - name: Run sonarqube scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
          SONAR_HOST_URL: ${{secrets.SONAR_HOST_URL}}
          
      - name: Check SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  owasp-dependency-check:
    # Name shown in the GitHub Actions dashboard
    name: OWASP Dependency Check

    # Run this job only after SonarQube finishes successfully
    needs: sonarqube

    # GitHub-hosted Linux runner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # Download repository code into the runner
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        run: |
         mkdir -p dependency-check-report

         docker run --rm \
          -v "${{ github.workspace }}:/src" \
          -v "${{ github.workspace }}/dependency-check-report:/report" \
          owasp/dependency-check:latest \
          --project "Madhubani-3Tier-App" \
          --scan "/src" \
          --format HTML \
          --out "/report" \
          --failOnCVSS 11 || true

         echo "========================"
         echo "Contents of report folder"
         echo "========================"

         ls -R dependency-check-report

      - name: Upload OWASP report
        # Run this step even when the scan finds vulnerabilities
        if: always()

        # Upload the HTML report as a GitHub Actions artifact
        uses: actions/upload-artifact@v4

        with:
          # Name shown under the workflow's Artifacts section
          name: owasp-dependency-check-report

          # Directory created by Dependency-Check
          path: dependency-check-report

          # Fail clearly if the report was not generated
          if-no-files-found: error


  docker-build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    needs: owasp-dependency-check
      # - frontend-ci
      # - backend-ci
        

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend # ***
          file: ./frontend/Dockerfile # ***
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/madhubani-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/madhubani-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/madhubani-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/madhubani-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
  
  
