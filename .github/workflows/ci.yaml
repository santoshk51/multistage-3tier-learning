name: Madhubani Three-Tier CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  frontend-ci:
    name: Frontend chal raha hai
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Verify frontend files
        run: |
          test -f frontend/index.html
          test -f frontend/style.css
          test -f frontend/app.js
          test -f frontend/nginx.conf
          test -f frontend/Dockerfile

      - name: Check frontend JavaScript syntax
        run: node --check frontend/app.js

  backend-ci:
    name: Backend chal raha hai
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Check backend JavaScript syntax
        run: node --check server.js
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs:
      - frontend-ci
      - backend-ci
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:   # Downloads your frontend, backend, and configuration files
          fetch-depth: 0

      - name: Run sonarqube scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
          SONAR_HOST_URL: ${{secrets.SONAR_HOST_URL}}
          
      - name: Check SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

