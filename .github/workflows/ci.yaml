name: Madhubani Three-Tier CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  frontend-ci:
    name: Validate Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Verify frontend files
        run: |
          test -f frontend/index.html
          test -f frontend/style.css
          test -f frontend/app.js
          test -f frontend/nginx.conf
          test -f frontend/Dockerfile

      - name: Check frontend JavaScript syntax
        run: node --check frontend/app.js

  backend-ci:
    name: Validate Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Check backend JavaScript syntax
        run: node --check server.js
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    needs:
      - frontend-ci
      - backend-ci

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build frontend Docker image
        run: |
          docker build \
            -t madhubani-frontend:${{ github.sha }} \
            ./frontend

      - name: Build backend Docker image
        run: |
          docker build \
            -t madhubani-backend:${{ github.sha }} \
            ./backend

      - name: List built images
        run: docker image ls