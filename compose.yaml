services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend-network
    mem_limit: 128m
    cpus: 0.5
    restart: unless-stopped

  backend:
    build: ./backend
    mem_limit: 512m
    cpus: 1.0
    environment:
      PORT: ${PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test:
        [
         "CMD",
         "node",
         "-e",
         "fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - frontend-network
      - backend-network
    restart: unless-stopped

  database:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_password_change_me"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend-network
    mem_limit: 1g
    cpus: 2.0
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  frontend-network:
  backend-network:










